<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Totem</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width:100vw; height:100vh;
    overflow:hidden;
    background:#0a0a0a;
    font-family: Georgia, 'Times New Roman', serif;
    user-select:none;
    touch-action:none;
  }

  /*
    O painel físico da TV fica de pé (portrait), mas o navegador continua
    renderizando em paisagem (100vw/100vh reais). #stage tem as dimensões
    trocadas (100vh x 100vw reais) e é rotacionado para preencher a tela
    física já em pé. Como #stage troca largura/altura, todas as unidades
    vh/vw usadas DENTRO dele também são trocadas (vh<->vw) em relação ao
    design original em portrait — é só inverter as unidades, sem precisar
    de JS para recalcular nada.

    Se a imagem aparecer de cabeça para baixo/espelhada na TV real, troque
    a linha "transform" do #stage abaixo pela alternativa comentada
    (sentido anti-horário).
  */
  #stage {
    position:absolute;
    top:0; left:0;
    width:100vh;
    height:100vw;
    background:#0a0a0a;
    transform-origin:0 0;
    transform: rotate(90deg) translateY(-100%);       /* sentido horário (padrão) */
    /* transform: rotate(-90deg) translateX(-100%); */ /* sentido anti-horário (alternativa) */
  }

  .app {
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    background:#0a0a0a;
  }

  /* ===== TITLE AREA ~15% ===== */
  .title-area {
    height:15vw;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0.6vw;
    padding-top:1vw;
  }

  .title-area h1 {
    color:#C9A84C;
    font-size:3.6vw;
    letter-spacing:0.35em;
    text-align:center;
    line-height:1.35;
    text-transform:uppercase;
    text-shadow: 0 0 18px rgba(201,168,76,0.35);
  }

  .title-line {
    display:flex;
    align-items:center;
    gap:1.2vh;
    width:60vh;
    margin-top:0.4vw;
  }

  .title-line .bar {
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, #C9A84C, transparent);
    opacity:0.6;
  }

  .title-icon { width:3vw; height:3vw; flex-shrink:0; }
  .title-icon circle, .title-icon line { stroke:#C9A84C; }

  /* ===== SLIDER AREA ~77% ===== */
  .slider-area {
    height:77vw;
    flex-shrink:0;
    position:relative;
    overflow:hidden;
    background:#000;
  }

  .pair-wrap {
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    transition: opacity 420ms ease;
  }
  .pair-wrap.fade-out { opacity:0; }

  .layer {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background-size:cover;
    background-position:center;
    will-change: clip-path;
  }
  .layer-top { transition: clip-path 80ms linear; }
  .layer-bottom { transition: clip-path 80ms linear; }

  .label {
    position:absolute;
    left:4vh;
    color:rgba(255,255,255,0.85);
    font-size:1.7vw;
    letter-spacing:0.18em;
    text-transform:uppercase;
    text-shadow:0 2px 6px rgba(0,0,0,0.8);
    pointer-events:none;
  }
  .label-top { top:2.5vw; }
  .label-bottom { bottom:2.5vw; }

  .divider {
    position:absolute;
    left:0; right:0;
    height:2px;
    background:#00FF88;
    box-shadow: 0 0 12px #00FF88, 0 0 24px #00CC66;
    transition: top 80ms linear;
    z-index:5;
  }

  .handle {
    position:absolute;
    left:50%;
    width:7.2vw; height:7.2vw;
    max-width:56px; max-height:56px;
    transform: translate(-50%, -50%);
    border-radius:50%;
    border:2px solid #00FF88;
    background:rgba(10,10,10,0.55);
    box-shadow: 0 0 14px rgba(0,255,136,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:6;
    cursor:grab;
  }
  .handle svg { width:55%; height:55%; }
  .handle svg path, .handle svg line { stroke:#00FF88; }


  /* ===== NAV AREA ~8% ===== */
  .nav-area {
    height:8vw;
    flex-shrink:0;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 5vh;
  }

  .nav-btn {
    width:6.4vw; height:6.4vw;
    max-width:54px; max-height:54px;
    border-radius:50%;
    border:1.5px solid rgba(201,168,76,0.55);
    background:rgba(255,255,255,0.04);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#C9A84C;
    font-size:2.6vw;
    cursor:pointer;
    transition: background 150ms ease, transform 150ms ease;
  }
  .nav-btn:active { transform:scale(0.9); background:rgba(201,168,76,0.18); }

  .pair-indicator {
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:flex;
    gap:1.2vw;
  }
  .dot {
    width:0.9vw; height:0.9vw;
    border-radius:50%;
    background:rgba(201,168,76,0.3);
    transition: background 250ms ease;
  }
  .dot.active { background:#C9A84C; }
</style>
</head>
<body>

<div id="stage">
<div class="app">

  <div class="title-area">
    <h1>Dois Tempos,<br>Mesmo Território</h1>
    <div class="title-line">
      <span class="bar"></span>
      <svg class="title-icon" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="3" fill="none" stroke-width="1.5"/>
        <line x1="20" y1="17" x2="20" y2="6" stroke-width="1.2"/>
        <line x1="20" y1="6" x2="13" y2="2" stroke-width="1.2"/>
        <line x1="20" y1="6" x2="27" y2="2" stroke-width="1.2"/>
        <line x1="17" y1="22" x2="8" y2="28" stroke-width="1.2"/>
        <line x1="8" y1="28" x2="8" y2="36" stroke-width="1.2"/>
        <line x1="8" y1="28" x2="2" y2="32" stroke-width="1.2"/>
        <line x1="23" y1="22" x2="32" y2="28" stroke-width="1.2"/>
        <line x1="32" y1="28" x2="32" y2="36" stroke-width="1.2"/>
        <line x1="32" y1="28" x2="38" y2="32" stroke-width="1.2"/>
      </svg>
      <span class="bar"></span>
    </div>
  </div>

  <div class="slider-area" id="sliderArea">
    <!-- pairs injected by JS -->
    <div class="divider" id="divider"></div>
    <div class="handle" id="handle">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2 L12 22 M7 6 L12 2 L17 6 M7 18 L12 22 L17 18" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div class="nav-area">
    <div class="nav-btn" id="prevBtn">&#8249;</div>
    <div class="pair-indicator" id="pairIndicator"></div>
    <div class="nav-btn" id="nextBtn">&#8250;</div>
  </div>

</div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------------------------------------------------
     1. CANVAS IMAGE GENERATION
  --------------------------------------------------------- */
  const W = 1080, H = 1600;

  function makeCanvas(){
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    return c;
  }

  function roundRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function drawBird(ctx, x, y, scale, color){
    ctx.strokeStyle = color;
    ctx.lineWidth = 3 * scale;
    ctx.beginPath();
    ctx.moveTo(x - 14*scale, y);
    ctx.quadraticCurveTo(x - 5*scale, y - 10*scale, x, y);
    ctx.quadraticCurveTo(x + 5*scale, y - 10*scale, x + 14*scale, y);
    ctx.stroke();
  }

  function drawTree(ctx, x, baseY, w, h, color){
    roundRect(ctx, x - w/2, baseY - h, w, h, w*0.35);
    ctx.fillStyle = color;
    ctx.fill();
  }

  // ---- Image: Seca (dry / warm tones) ----
  function genSeca(opts){
    const c = makeCanvas();
    const ctx = c.getContext('2d');
    opts = opts || {};
    const skyTop = opts.skyTop || '#3a2410';
    const skyMid = opts.skyMid || '#CD853F';
    const skyHorizon = opts.skyHorizon || '#F2C14E';
    const groundNear = opts.groundNear || '#8B4513';
    const groundFar = opts.groundFar || '#D2691E';
    const treeColor = opts.treeColor || '#2b1a0e';
    const horizonY = H * 0.62;

    // sky
    let g = ctx.createLinearGradient(0,0,0,horizonY);
    g.addColorStop(0, skyTop);
    g.addColorStop(0.55, skyMid);
    g.addColorStop(1, skyHorizon);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,horizonY);

    // sun glow
    let sun = ctx.createRadialGradient(W*0.7, horizonY*0.85, 0, W*0.7, horizonY*0.85, 260);
    sun.addColorStop(0, 'rgba(255,230,150,0.9)');
    sun.addColorStop(1, 'rgba(255,230,150,0)');
    ctx.fillStyle = sun;
    ctx.fillRect(0,0,W,horizonY);

    // ground
    let gg = ctx.createLinearGradient(0,horizonY,0,H);
    gg.addColorStop(0, groundFar);
    gg.addColorStop(1, groundNear);
    ctx.fillStyle = gg;
    ctx.fillRect(0,horizonY,W,H-horizonY);

    // cracked dry texture lines
    ctx.strokeStyle = 'rgba(60,30,10,0.25)';
    ctx.lineWidth = 2;
    for(let i=0;i<14;i++){
      ctx.beginPath();
      const sx = Math.random()*W, sy = horizonY + Math.random()*(H-horizonY);
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + (Math.random()-0.5)*120, sy + (Math.random())*80);
      ctx.stroke();
    }

    // trees along horizon
    for(let i=0;i<10;i++){
      const x = (i+0.5) * (W/10) + (Math.random()-0.5)*30;
      const h = 60 + Math.random()*70;
      drawTree(ctx, x, horizonY + 10, 24 + Math.random()*14, h, treeColor);
    }

    // birds
    for(let i=0;i<6;i++){
      drawBird(ctx, 80 + Math.random()*(W-160), 60 + Math.random()*(horizonY*0.5), 1 + Math.random()*0.8, 'rgba(20,10,5,0.8)');
    }

    return c.toDataURL();
  }

  // ---- Image: Cheia (flood / cool tones) ----
  function genCheia(opts){
    const c = makeCanvas();
    const ctx = c.getContext('2d');
    opts = opts || {};
    const skyTop = opts.skyTop || '#0d2630';
    const skyMid = opts.skyMid || '#2d6a7a';
    const skyHorizon = opts.skyHorizon || '#a9d8d4';
    const waterNear = opts.waterNear || '#1a3a4a';
    const waterFar = opts.waterFar || '#4a9a8a';
    const treeColor = opts.treeColor || '#0e2a1c';
    const horizonY = H * 0.58;

    // sky
    let g = ctx.createLinearGradient(0,0,0,horizonY);
    g.addColorStop(0, skyTop);
    g.addColorStop(0.6, skyMid);
    g.addColorStop(1, skyHorizon);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,horizonY);

    // clouds
    for(let i=0;i<8;i++){
      const cx = Math.random()*W, cy = Math.random()*horizonY*0.6, rw = 60+Math.random()*120, rh = 18+Math.random()*22;
      ctx.fillStyle = 'rgba(255,255,255,'+(0.12+Math.random()*0.18).toFixed(2)+')';
      ctx.beginPath();
      ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // water
    let gg = ctx.createLinearGradient(0,horizonY,0,H);
    gg.addColorStop(0, waterFar);
    gg.addColorStop(1, waterNear);
    ctx.fillStyle = gg;
    ctx.fillRect(0,horizonY,W,H-horizonY);

    // ripple lines
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 2;
    for(let i=0;i<16;i++){
      const y = horizonY + 20 + i*((H-horizonY-20)/16);
      ctx.beginPath();
      ctx.moveTo(0, y);
      for(let x=0;x<=W;x+=40){
        ctx.lineTo(x, y + Math.sin(x*0.02 + i)*4);
      }
      ctx.stroke();
    }

    // dense trees along horizon
    for(let i=0;i<14;i++){
      const x = (i+0.5) * (W/14) + (Math.random()-0.5)*20;
      const h = 80 + Math.random()*90;
      drawTree(ctx, x, horizonY + 8, 20 + Math.random()*16, h, treeColor);
    }

    // birds
    for(let i=0;i<5;i++){
      drawBird(ctx, 80 + Math.random()*(W-160), 50 + Math.random()*(horizonY*0.45), 1 + Math.random()*0.8, 'rgba(10,20,15,0.75)');
    }

    // capybaras in water
    for(let i=0;i<5;i++){
      const x = 100 + Math.random()*(W-200);
      const y = horizonY + 60 + Math.random()*(H-horizonY-120);
      ctx.fillStyle = 'rgba(101,67,33,0.85)';
      ctx.beginPath();
      ctx.ellipse(x, y, 34, 16, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x-30, y-4, 12, 9, 0, 0, Math.PI*2);
      ctx.fill();
    }

    return c.toDataURL();
  }

  // ---- Image: Cerrado seca (ocher) ----
  function genCerradoSeca(){
    return genSeca({
      skyTop:'#2a1a08', skyMid:'#C98A3E', skyHorizon:'#E8B84B',
      groundNear:'#7a5230', groundFar:'#b9863f',
      treeColor:'#241608'
    });
  }

  // ---- Image: Cerrado chuvas (dark green) ----
  function genCerradoChuvas(){
    return genCheia({
      skyTop:'#0a1f1a', skyMid:'#1f4a3a', skyHorizon:'#8fc2a0',
      waterNear:'#13261c', waterFar:'#2f6b4a',
      treeColor:'#0a1c10'
    });
  }

  const pairs = [
    {
      labelTop: 'Pantanal — Seca',
      labelBottom: 'Pantanal — Cheia',
      imgTop: genSeca(),
      imgBottom: genCheia()
    },
    {
      labelTop: 'Cerrado — Seca',
      labelBottom: 'Cerrado — Chuvas',
      imgTop: genCerradoSeca(),
      imgBottom: genCerradoChuvas()
    }
  ];

  /* ---------------------------------------------------------
     2. DOM SETUP
  --------------------------------------------------------- */
  const sliderArea = document.getElementById('sliderArea');
  const divider = document.getElementById('divider');
  const handle = document.getElementById('handle');
  const pairIndicator = document.getElementById('pairIndicator');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let currentIndex = 0;
  let splitPercent = 50;
  let wraps = []; // {wrap, top, bottom}

  function buildPairDom(pair){
    const wrap = document.createElement('div');
    wrap.className = 'pair-wrap';

    const top = document.createElement('div');
    top.className = 'layer layer-top';
    top.style.backgroundImage = "url('" + pair.imgTop + "')";

    const bottom = document.createElement('div');
    bottom.className = 'layer layer-bottom';
    bottom.style.backgroundImage = "url('" + pair.imgBottom + "')";

    const labelTop = document.createElement('div');
    labelTop.className = 'label label-top';
    labelTop.textContent = pair.labelTop;

    const labelBottom = document.createElement('div');
    labelBottom.className = 'label label-bottom';
    labelBottom.textContent = pair.labelBottom;

    wrap.appendChild(top);
    wrap.appendChild(bottom);
    wrap.appendChild(labelTop);
    wrap.appendChild(labelBottom);

    sliderArea.insertBefore(wrap, divider);

    return { wrap, top, bottom };
  }

  pairs.forEach(p => wraps.push(buildPairDom(p)));

  function buildIndicator(){
    pairIndicator.innerHTML = '';
    pairs.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === currentIndex ? ' active' : '');
      pairIndicator.appendChild(dot);
    });
  }
  buildIndicator();

  function applySplit(percent, instant){
    splitPercent = Math.max(5, Math.min(95, percent));
    wraps.forEach(w => {
      w.top.style.clipPath = 'inset(0 0 ' + (100 - splitPercent) + '% 0)';
      w.bottom.style.clipPath = 'inset(' + splitPercent + '% 0 0 0)';
    });
    divider.style.top = splitPercent + '%';
    handle.style.top = splitPercent + '%';

    if(instant){
      [divider, handle].forEach(el => el.style.transition = 'none');
      wraps.forEach(w => { w.top.style.transition='none'; w.bottom.style.transition='none'; });
      requestAnimationFrame(()=>{
        [divider, handle].forEach(el => el.style.transition = '');
        wraps.forEach(w => { w.top.style.transition=''; w.bottom.style.transition=''; });
      });
    }
  }

  function showPair(index){
    wraps.forEach((w, i) => {
      w.wrap.style.zIndex = (i === index) ? 2 : 1;
      w.wrap.classList.toggle('fade-out', i !== index);
    });
    buildIndicator();
  }

  applySplit(50, true);
  showPair(0);

  /* ---------------------------------------------------------
     3. NAVIGATION
  --------------------------------------------------------- */
  function goTo(index){
    currentIndex = (index + pairs.length) % pairs.length;
    showPair(currentIndex);
  }

  prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
  nextBtn.addEventListener('click', () => goTo(currentIndex + 1));

  /* ---------------------------------------------------------
     4. DRAG INTERACTION (mouse + touch)
  --------------------------------------------------------- */
  let dragging = false;

  /*
    A página é rotacionada via CSS (#stage), e nesse hardware o toque
    chega com um desencontro entre a posição física do dedo e a posição
    absoluta que o navegador calcula (por isso o salto ao tocar). Para
    não depender dessa posição absoluta, o arraste aqui é por DELTA:
    guarda onde o toque começou e o split atual, e só aplica a diferença
    de movimento — não a posição absoluta. Isso elimina o salto.

    Usamos Pointer Events (em vez de mouse+touch separados) com
    setPointerCapture: assim o próprio elemento "handle" recebe todos os
    eventos de movimento/soltura enquanto o gesto durar, mesmo que o
    dedo/cursor saia da área dele — evita que um listener solto na
    window capture eventos de outro ponteiro/gesto e mexa o slider sem
    ninguém estar arrastando.
  */
  let dragStartX = 0;
  let dragStartPercent = 50;

  function startDrag(clientX){
    dragging = true;
    dragStartX = clientX;
    dragStartPercent = splitPercent;
  }
  function moveDrag(clientX){
    if(!dragging) return;
    const rect = sliderArea.getBoundingClientRect();
    const deltaPercent = ((dragStartX - clientX) / rect.width) * 100;
    applySplit(dragStartPercent + deltaPercent);
  }
  function endDrag(){
    if(!dragging) return;
    dragging = false;
  }

  handle.addEventListener('pointerdown', e => {
    handle.setPointerCapture(e.pointerId);
    startDrag(e.clientX);
    e.preventDefault();
  });
  handle.addEventListener('pointermove', e => { moveDrag(e.clientX); });
  handle.addEventListener('pointerup', endDrag);
  handle.addEventListener('pointercancel', endDrag);
  handle.addEventListener('lostpointercapture', endDrag);

})();
</script>
</body>
</html>
